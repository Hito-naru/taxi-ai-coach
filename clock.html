<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .clock-container { display: flex; flex-direction: column; align-items: center; }
        .clock { font-size: 2em; margin: 20px; }
        .controls { display: flex; justify-content: center; margin-bottom: 20px; }
        .control-button { margin: 0 10px; padding: 10px; }
        .theme-toggle { cursor: pointer; }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="clock" id="clock">Loading...</div>
        <div class="controls">
            <button class="control-button" id="copyButton">Copy to Clipboard</button>
            <button class="control-button theme-toggle" id="themeToggle">Toggle Theme</button>
        </div>
        <input type="text" id="timezone" placeholder="Search Timezone" />
        <select id="timeFormat">
            <option value="12">12-hour</option>
            <option value="24">24-hour</option>
        </select>
    </div>

    <script>
        const clockElement = document.getElementById('clock');
        const copyButton = document.getElementById('copyButton');
        const themeToggle = document.getElementById('themeToggle');
        const timezoneInput = document.getElementById('timezone');
        const timeFormatSelect = document.getElementById('timeFormat');

        let currentTheme = 'light';

        function updateClock() {
            const timezone = timezoneInput.value || 'UTC';
            const date = new Date().toLocaleString('en-US', { timeZone: timezone, hour12: timeFormatSelect.value === '12' });
            clockElement.textContent = date;
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.classList.toggle('dark', currentTheme === 'dark');
            localStorage.setItem('theme', currentTheme);
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(clockElement.textContent);
            alert('Copied to clipboard!');
        }

        function loadPreferences() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                currentTheme = savedTheme;
                document.body.classList.toggle('dark', currentTheme === 'dark');
            }
            const savedFormat = localStorage.getItem('timeFormat');
            if (savedFormat) {
                timeFormatSelect.value = savedFormat;
            }
            timezoneInput.value = localStorage.getItem('timezone') || '';
        }

        copyButton.addEventListener('click', copyToClipboard);
        themeToggle.addEventListener('click', toggleTheme);
        timeFormatSelect.addEventListener('change', (e) => {
            localStorage.setItem('timeFormat', e.target.value);
            updateClock();
        });
        timezoneInput.addEventListener('input', (e) => {
            localStorage.setItem('timezone', e.target.value);
            updateClock();
        });

        loadPreferences();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
